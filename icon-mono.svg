<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Couturier monochrome icon">
  <title>Couturier (Monochrome)</title>
  <!-- All white on transparent — suitable for dark backgrounds, t-shirts, embossing -->
  <!-- Background square outline -->
  <rect x="41" y="41" width="430" height="430" rx="96" fill="none" stroke="currentColor" stroke-width="20"/>

  <!-- Back page -->
  <rect x="222" y="96" width="155" height="196" rx="14" fill="none" stroke="currentColor" stroke-width="14" opacity="0.55"/>
  <polygon points="341,96 377,96 377,132 341,132" fill="currentColor" opacity="0.55"/>

  <!-- Front page -->
  <rect x="138" y="148" width="155" height="196" rx="14" fill="none" stroke="currentColor" stroke-width="16"/>
  <polygon points="257,148 293,148 293,184 257,184" fill="currentColor"/>
  <!-- Lines -->
  <rect x="158" y="225" width="110" height="10" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="158" y="250" width="125" height="10" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="158" y="275" width="85"  height="10" rx="5" fill="currentColor" opacity="0.5"/>

  <!-- Arrow -->
  <polygon
    points="108,344 198,344 198,318 252,372 198,426 198,400 108,400"
    fill="currentColor"
  />
</svg>
